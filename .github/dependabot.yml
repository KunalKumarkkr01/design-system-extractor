version: 2
updates:
  # Keep GitHub Actions used in workflows up to date (e.g. checkout, setup-node).
  # This is what raises the Node 20 -> 24 action bumps as PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
